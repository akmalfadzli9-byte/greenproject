<!DOCTYPE html>
<html lang="ms" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Log masuk ke sistem pengurusan Greenhouse SaaS – kawal rumah hijau anda dengan selamat.">
    <title>Greenhouse Login | Pengurusan Ladang Pintar</title>
    <!-- Tailwind CSS CDN + basic interceptions -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Custom overrides for dark mode and modal -->
    <link rel="stylesheet" href="css/login.css">
    <!-- Custom config for Tailwind dark mode (force dark class strategy) -->
    <script>
        tailwind.config = {
            darkMode: 'class'
        }
    </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 transition-colors duration-300 font-sans antialiased">

    <main class="min-h-screen flex items-center justify-center px-4 py-8">
        <!-- Login Card -->
        <div class="w-full max-w-md bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-6 md:p-8 transition-all">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-green-100 dark:bg-green-900 rounded-full mb-4">
                    <svg class="w-8 h-8 text-green-600 dark:text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M6 14h12m-6-8v16m-7 0h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                </div>
                <h1 class="text-2xl font-bold text-gray-800 dark:text-white">Greenhouse SaaS</h1>
                <p class="text-gray-500 dark:text-gray-400 mt-1">Log masuk ke sistem pengurusan</p>
            </div>

            <!-- Error message area -->
            <div id="error-container" class="mb-4 min-h-[64px]">
                <div id="error-message" class="bg-red-50 dark:bg-red-900/30 text-red-700 dark:text-red-300 p-3 rounded-lg text-sm hidden transition-all"></div>
            </div>

            <!-- Login Form -->
            <form id="login-form" novalidate>
                <!-- Email field (hidden label for screen reader) -->
                <div class="mb-4">
                    <label for="email" class="sr-only">Alamat emel</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207" />
                            </svg>
                        </div>
                        <input type="email" id="email" name="email" required
                               class="w-full pl-10 pr-3 py-3 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 dark:bg-gray-700 dark:text-white transition"
                               placeholder="emel@ladang.com" autocomplete="email">
                    </div>
                </div>

                <!-- Password field with show/hide toggle -->
                <div class="mb-4">
                    <label for="password" class="sr-only">Kata laluan</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                            </svg>
                        </div>
                        <input type="password" id="password" name="password" required
                               class="w-full pl-10 pr-12 py-3 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 dark:bg-gray-700 dark:text-white transition"
                               placeholder="Kata laluan" autocomplete="current-password">
                        <button type="button" id="toggle-password" class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-500 hover:text-gray-700 dark:text-gray-400" aria-label="Tunjuk/sembunyi kata laluan">
                            <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Forgot password link -->
                <div class="text-right mb-6">
                    <button type="button" id="forgot-password-btn" class="text-sm text-green-600 dark:text-green-400 hover:underline focus:outline-none focus:ring-2 focus:ring-green-500 rounded">
                        Lupa kata laluan?
                    </button>
                </div>

                <!-- Submit button -->
                <button type="submit" id="login-btn"
                        class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200 focus:outline-none focus:ring-2 focus:ring-green-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800">
                    Log Masuk
                </button>
            </form>
        </div>
    </main>

    <!-- Footer with dark mode toggle -->
    <footer class="fixed bottom-0 left-0 w-full py-4 text-center text-sm text-gray-500 dark:text-gray-400 border-t border-gray-200 dark:border-gray-700 bg-gray-50/90 dark:bg-gray-900/90 backdrop-blur-sm">
        <div class="flex items-center justify-center gap-4">
            <span>© 2025 Greenhouse SaaS</span>
            <button id="darkmode-toggle" class="inline-flex items-center gap-2 px-3 py-1.5 rounded-full bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 transition">
                <svg class="w-4 h-4 dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                </svg>
                <svg class="w-4 h-4 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
                </svg>
                <span>Gelap / Terang</span>
            </button>
        </div>
    </footer>

    <!-- Forgot Password Modal -->
    <div id="forgot-modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50 hidden transition-all" aria-hidden="true">
        <div class="bg-white dark:bg-gray-800 rounded-xl max-w-md w-full mx-4 p-6 shadow-2xl transform transition-all">
            <h3 class="text-xl font-semibold text-gray-900 dark:text-white mb-2">Reset kata laluan</h3>
            <p class="text-gray-600 dark:text-gray-300 mb-4">Pautan reset akan dihantar ke emel anda (demo sahaja – tiada backend).</p>
            <div class="flex justify-end gap-3">
                <button id="modal-close" class="px-4 py-2 bg-gray-200 dark:bg-gray-700 rounded-lg hover:bg-gray-300 dark:hover:bg-gray-600 transition">Tutup</button>
            </div>
        </div>
    </div>

    <script src="js/auth.js" defer></script>
</body>
</html>
